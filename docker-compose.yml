services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-compass}
      POSTGRES_USER: ${POSTGRES_USER:-compass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-compass}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-compass}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-compass}
      POSTGRES_USER: ${POSTGRES_USER:-compass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-compass}
      DB_HOST: db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://compass-v2.local,http://localhost:3000}
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_CACHE_TTL_SECONDS: ${JIRA_CACHE_TTL_SECONDS:-86400}
      JIRA_TARGET_END_FIELD_NAMES: ${JIRA_TARGET_END_FIELD_NAMES:-}
    volumes:
      - ./backend:/app/backend
      - ./modules:/app/modules
      - ./conftest.py:/app/conftest.py
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      db:
        condition: service_healthy
    command: ["--reload"]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://compass-v2.local/api}
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/next.config.ts:/app/frontend/next.config.ts
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json
      - ./modules:/app/modules
    command: ["npm", "run", "dev"]

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
